name: test

on:
  push:
    branches:
      - dev
  pull_request:
  workflow_dispatch:

concurrency:
  # Keep every run on dev so cancelled checks do not pollute the default branch
  # commit history. PRs and other branches still share a group and cancel stale runs.
  # ponytail: `case()` doesn't exist in GHA expressions — use &&/|| ternary
  group: ${{ github.ref == 'refs/heads/dev' && format('{0}-{1}', github.workflow, github.run_id) || format('{0}-{1}', github.workflow, github.event.pull_request.number || github.ref) }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit:
    name: unit (${{ matrix.settings.name }} / ${{ matrix.shard }}/5)
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: linux
            host: ubuntu-latest
          - name: windows
            host: windows-latest
        shard:
          - 1
          - 2
          - 3
          - 4
          - 5
    runs-on: ${{ matrix.settings.host }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Setup Bun
        uses: ./.github/actions/setup-bun
        with:
          bun-version: ''

      - name: Configure git identity
        run: |
          git config --global user.email "bot@openaxe.dev"
          git config --global user.name "openaxe"

      - name: Cache Turbo
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('turbo.json', '**/package.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('turbo.json', '**/package.json') }}-
            turbo-${{ runner.os }}-

      - name: Run core/ui tests
        if: matrix.shard == 1
        timeout-minutes: ${{ matrix.settings.name == 'windows' && 20 || 10 }}
        run: GITHUB_ACTIONS=false bun turbo test --filter=@opencode-ai/core --filter=@opencode-ai/ui

      - name: Run openaxe tests
        working-directory: packages/openaxe
        timeout-minutes: ${{ matrix.settings.name == 'windows' && 50 || 30 }}
        run: GITHUB_ACTIONS=false bun test --shard=${{ matrix.shard }}/5 --timeout 180000 --path-ignore-patterns='**/provider/**'
        env:
          OPENCODE_EXPERIMENTAL_DISABLE_FILEWATCHER: ${{ runner.os == 'Windows' && 'true' || 'false' }}

      - name: Run HttpApi exerciser gates
        if: matrix.settings.name == 'linux' && matrix.shard == 1
        working-directory: packages/openaxe
        timeout-minutes: 15
        run: GITHUB_ACTIONS=false bun run test:httpapi


