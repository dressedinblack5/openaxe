version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      effect:
        patterns:
          - "effect"
          - "@effect/*"
      opentui:
        patterns:
          - "@opentui/*"
      drizzle:
        patterns:
          - "drizzle-orm"
          - "@drizzle-orm/*"

  - package-ecosystem: "npm"
    directory: "/packages/openaxe"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      dependencies:
        patterns:
          - "*"

