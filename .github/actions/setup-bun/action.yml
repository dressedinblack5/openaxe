name: "Setup Bun"
description: "Setup Bun with caching and install dependencies"
inputs:
  install-flags:
    description: "Additional flags to pass to 'bun install'"
    required: false
    default: ""
  bun-version:
    description: "Bun version to install (overrides package.json)"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Setup Bun (from package.json)
      if: inputs.bun-version == ''
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version-file: package.json

    - name: Setup Bun (version override)
      if: inputs.bun-version != ''
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Get cache directory
      id: cache
      shell: bash
      run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

    - name: Restore Bun dependencies
      id: bun-cache
      uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: ${{ steps.cache.outputs.dir }}
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install setuptools for distutils compatibility
      run: python3 -m pip install setuptools || pip install setuptools || true
      shell: bash

    - name: Install dependencies
      run: |
        # Workaround for patched peer variants
        # e.g. ./patches/ for standard-openapi
        # https://github.com/oven-sh/bun/issues/28147
        if [ "$RUNNER_OS" = "Windows" ]; then
          bun install --linker hoisted ${{ inputs.install-flags }}
        else
          bun install ${{ inputs.install-flags }}
        fi
      shell: bash

    - name: Save Bun dependencies
      if: steps.bun-cache.outputs.cache-hit != 'true' && github.event_name != 'pull_request' && github.event_name != 'pull_request_target'
      uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: ${{ steps.cache.outputs.dir }}
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
